name: Run code checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUST_TOOLCHAIN: "1.91.1"

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN }}"
          components: "rustfmt"

      - name: Run format check
        run: cargo fmt --check

  all-features-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN }}"
          components: "clippy"

      - name: Build packages
        run: cargo build --all-targets --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features

      - name: Run tests
        run: cargo test --all-targets --all-features

  feature-specific-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature_set:
          - name: "Default features only"
            args: ""
          - name: "LSP feature only"
            args: "--no-default-features --features lsp"
          - name: "Format feature only"
            args: "--no-default-features --features format"
          - name: "Rust feature only"
            args: "--no-default-features --features rust"
          - name: "Kotlin feature only"
            args: "--no-default-features --features kotlin"
          - name: "Swift feature only"
            args: "--no-default-features --features swift"
          - name: "All feature features"
            args: "--all-features"

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN }}"
          components: "clippy"

      - name: Build packages
        run: cargo build ${{ matrix.feature_set.args }} -p dbuf

      - name: Run clippy
        run: cargo clippy ${{ matrix.feature_set.args }} -p dbuf

      - name: Run tests
        run: cargo test ${{ matrix.feature_set.args }} -p dbuf
